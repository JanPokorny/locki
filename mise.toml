[tools]
uv = "latest"
lima = "2.1.0"
yq = "latest"

[settings]
task.disable_spec_from_run_scripts = true

[hooks]
postinstall = ["{{ mise_bin }} setup"]

[env]
UV_PYTHON_PREFERENCE = "only-managed"

# setup

[tasks.setup]
depends = ["setup:*"]

[tasks."setup:uv"]
hide = true
run = "uv sync --all-extras --dev"
sources = ["uv.lock", "pyproject.toml"]

[tasks."setup:git-hooks"]
hide = true
run = """
#!/bin/bash
test ! -d .git && exit 0
printf '#!/bin/sh\nmise run git-hooks:pre-commit' >.git/hooks/pre-commit <<'HOOK'
chmod +x .git/hooks/pre-commit
"""

# git hooks

[tasks."git-hooks:pre-commit"]
hide = true
depends = ["check"]

# check

[tasks.check]
depends = ["check:*"]

[tasks."check:ruff"]
run = "uv run ruff check --quiet"
sources = ["src/**/*.py"]

[tasks."check:ruff-format"]
run = "uv run ruff format --quiet --check"
sources = ["src/**/*.py"]

# fix

[tasks.fix]
depends = ["fix:*"]

[tasks."fix:ruff"]
run = "uv run ruff check --quiet --fix"

[tasks."fix:ruff-format"]
run = "uv run ruff format --quiet"

# test

[tasks.test]
run = "./test/e2e.sh"

# build

[tasks."build:download-binaries"]
description = "Download Lima binaries for all platforms"
run = '''
#!/usr/bin/env bash
set -euxo pipefail
LIMA_VERSION=$(mise current lima)
mkdir -p ./vendor
echo '*' >./vendor/.gitignore
( test -f ./vendor/lima-$LIMA_VERSION/manylinux_2_34_x86_64/bin/limactl  || ( mkdir -p ./vendor/lima-$LIMA_VERSION/manylinux_2_34_x86_64  && curl -fsL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Linux-x86_64.tar.gz  | tar -xzf - -C ./vendor/lima-$LIMA_VERSION/manylinux_2_34_x86_64  )) &
( test -f ./vendor/lima-$LIMA_VERSION/manylinux_2_34_aarch64/bin/limactl || ( mkdir -p ./vendor/lima-$LIMA_VERSION/manylinux_2_34_aarch64 && curl -fsL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Linux-aarch64.tar.gz | tar -xzf - -C ./vendor/lima-$LIMA_VERSION/manylinux_2_34_aarch64 )) &
( test -f ./vendor/lima-$LIMA_VERSION/macosx_12_0_x86_64/bin/limactl     || ( mkdir -p ./vendor/lima-$LIMA_VERSION/macosx_12_0_x86_64     && curl -fsL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Darwin-x86_64.tar.gz | tar -xzf - -C ./vendor/lima-$LIMA_VERSION/macosx_12_0_x86_64     )) &
( test -f ./vendor/lima-$LIMA_VERSION/macosx_12_0_arm64/bin/limactl      || ( mkdir -p ./vendor/lima-$LIMA_VERSION/macosx_12_0_arm64      && curl -fsL https://github.com/lima-vm/lima/releases/download/v${LIMA_VERSION}/lima-${LIMA_VERSION}-Darwin-arm64.tar.gz  | tar -xzf - -C ./vendor/lima-$LIMA_VERSION/macosx_12_0_arm64      )) &
wait
'''

[tasks.build]
description = "Build sdist, universal wheel, and platform-specific wheels with bundled limactl"
depends = ["setup", "build:*"]
sources = ["src/**/*", "pyproject.toml", "vendor/lima/**/*"]
outputs = ["dist/**/*"]
run = '''
#!/usr/bin/env bash
set -euxo pipefail

rm -rf ./dist
uv build -q --out-dir ./dist
export lima_version=$(mise current lima)
export version="$(yq -r '.project.version' pyproject.toml | tr -d '-')"
export universal_wheel=$(realpath "./dist/locki-$version-py3-none-any.whl")

tmpdir="$(mktemp -d)"
unzip -q "$universal_wheel" -d "$tmpdir"
find "$tmpdir" -type f -exec chmod +r {} \;
insert_line=$(awk '/^Requires-Dist:/ {print FNR-1; exit}' "$tmpdir/locki-${version}.dist-info/METADATA" | cut -d: -f1)
(
  head -n $insert_line "$tmpdir/locki-${version}.dist-info/METADATA"
  uv export --no-hashes --no-dev --format requirements-txt | sed '/^[[:space:]]*#/d; /^-e /d' | while IFS= read -r dep; do
    if [[ -n "$dep" && "$dep" =~ ^[a-zA-Z] ]]; then
      echo "Requires-Dist: $dep"
    fi
  done
  awk -v insert_line="$insert_line" 'NR > insert_line && $0 !~ /^Requires-Dist:/' "$tmpdir/locki-${version}.dist-info/METADATA"
) > "$tmpdir/locki-${version}.dist-info/METADATA.new"
mv "$tmpdir/locki-${version}.dist-info/METADATA.new" "$tmpdir/locki-${version}.dist-info/METADATA"
rm "$universal_wheel"
uv run -m wheel pack "$tmpdir" --dest-dir ./dist >/dev/null
rm -rf "$tmpdir"

if ! uv tool run --isolated --from "$universal_wheel" -- locki --help >/dev/null; then
  echo "Failed to install $universal_wheel"
  exit 1
fi

build_wheel() {
  wheel_tag="$1"
  hostagent_arch="$2"
  tmpdir="$(mktemp -d)"
  unzip -q "$universal_wheel" -d "$tmpdir"
  find "$tmpdir" -type f -exec chmod +r {} \;
  mkdir -p "$tmpdir/locki/data/bin" "$tmpdir/locki/data/share/lima"
  cp "./vendor/lima-$lima_version/$wheel_tag/bin/limactl" "$tmpdir/locki/data/bin/"
  cp -R "./vendor/lima-$lima_version/$wheel_tag/share/lima/." "$tmpdir/locki/data/share/lima/"
  perl -pi -e "s/Root-Is-Purelib: true/Root-Is-Purelib: false/" "$tmpdir/locki-$version.dist-info/WHEEL"
  perl -pi -e "s/Tag: .*/Tag: py3-none-$wheel_tag/" "$tmpdir/locki-$version.dist-info/WHEEL"
  uv run -m wheel pack "$tmpdir" --dest-dir ./dist >/dev/null
  rm -rf "$tmpdir"
}
build_wheel manylinux_2_34_x86_64  x86_64  &
build_wheel manylinux_2_34_aarch64 aarch64 &
build_wheel macosx_12_0_x86_64     x86_64  &
build_wheel macosx_12_0_arm64      aarch64 &
for job in $(jobs -p); do wait $job; done
'''

[tasks.publish]
depends = ["build"]
run = '''
UV_PUBLISH_TOKEN="$(op item get "PyPI token" --reveal --fields=credential)" uv publish
'''
