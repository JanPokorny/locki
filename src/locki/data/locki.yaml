minimumLimaVersion: "2.0.0"

base:
  - template:fedora

containerd:
  system: false
  user: false

mounts:
  - location: "~/.locki/worktrees"
    writable: true
  - location: "~/.locki/home"
    mountPoint: "/root/.locki/home"
    writable: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      if command -v incus; then exit 0; fi
      echo "root:1000000:1000000000" >> /etc/subuid
      echo "root:1000000:1000000000" >> /etc/subgid
      dnf install -y --setopt install_weak_deps=False incus incus-client
      systemctl enable --now incus
      mkdir -p /var/cache/locki
      incus admin init --preseed <<EOF
      storage_pools:
        - name: default
          driver: dir
      networks:
        - name: incusbr0
          type: bridge
          config:
            ipv4.address: 10.99.0.1/24
            ipv4.nat: "true"
            ipv6.address: none
      profiles:
        - name: default
          config:
            environment.PATH: /opt/locki/bin:/root/.local/bin:/var/cache/locki/mise/data/shims:/var/cache/locki/pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            environment.PNPM_HOME: /var/cache/locki/pnpm
            environment.UV_CACHE_DIR: /var/cache/locki/uv
            environment.PIP_CACHE_DIR: /var/cache/locki/pip
            environment.NPM_CONFIG_CACHE: /var/cache/locki/npm
            environment.YARN_CACHE_FOLDER: /var/cache/locki/yarn
            environment.GOMODCACHE: /var/cache/locki/go/mod
            environment.GOCACHE: /var/cache/locki/go/build
            environment.CARGO_HOME: /var/cache/locki/cargo
            environment.GRADLE_USER_HOME: /var/cache/locki/gradle
            environment.MAVEN_OPTS: -Dmaven.repo.local=/var/cache/locki/maven
            environment.BUNDLE_PATH: /var/cache/locki/bundle
            environment.COMPOSER_CACHE_DIR: /var/cache/locki/composer
            environment.NUGET_PACKAGES: /var/cache/locki/nuget
            environment.STACK_ROOT: /var/cache/locki/stack
            environment.CABAL_DIR: /var/cache/locki/cabal
            environment.HEX_HOME: /var/cache/locki/hex
            environment.MIX_HOME: /var/cache/locki/mix
            environment.REBAR_CACHE_DIR: /var/cache/locki/rebar3
            environment.PUB_CACHE: /var/cache/locki/pub
            environment.JULIA_DEPOT_PATH: /var/cache/locki/julia
            environment.COURSIER_CACHE: /var/cache/locki/coursier
            environment.R_LIBS_USER: /var/cache/locki/r
            environment.NIMBLE_DIR: /var/cache/locki/nimble
            environment.ZIG_GLOBAL_CACHE_DIR: /var/cache/locki/zig
            environment.DENO_DIR: /var/cache/locki/deno
            environment.BUN_INSTALL_CACHE_DIR: /var/cache/locki/bun
            environment.LEIN_HOME: /var/cache/locki/lein
            environment.TF_PLUGIN_CACHE_DIR: /var/cache/locki/terraform
            environment.CONAN_USER_HOME: /var/cache/locki/conan
            environment.VCPKG_DEFAULT_BINARY_CACHE: /var/cache/locki/vcpkg
            environment.COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
            environment.GEMINI_FORCE_ENCRYPTED_FILE_STORAGE: "true"
            environment.MISE_DATA_DIR: /var/cache/locki/mise/data
            environment.MISE_CACHE_DIR: /var/cache/locki/mise/cache
            environment.MISE_INSTALL_PATH: /usr/local/bin/mise
            environment.MISE_TRUSTED_CONFIG_PATHS: /
            environment.IS_SANDBOX: 1
            security.nesting: "true"
            security.privileged: "true"
            raw.lxc: |
              lxc.mount.auto = proc:rw sys:rw
              lxc.cap.drop =
          devices:
            root:
              path: /
              pool: default
              type: disk
            eth0:
              name: eth0
              network: incusbr0
              type: nic
            kmsg:
              path: /dev/kmsg
              source: /dev/kmsg
              type: unix-char
            cache:
              path: /var/cache/locki
              source: /var/cache/locki
              type: disk
            home:
              path: /root
              source: /root/.locki/home
              type: disk
      EOF
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      if incus image list --format csv | grep -q locki-base; then exit 0; fi
      incus launch images:fedora/43 locki-base-builder
      incus exec locki-base-builder -- bash -euxo pipefail -c '
      	curl --retry 10 --retry-all-errors https://mirrors.fedoraproject.org  # network takes a few seconds to connect
      	dnf install -y \
      	  https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm \
      	  https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
      	dnf -y copr enable jdxcode/mise
      	dnf -y install mise
      '
      incus stop locki-base-builder
      incus publish locki-base-builder --alias locki-base
      incus delete locki-base-builder
  - mode: data
    content: |
      #!/usr/bin/env python3
      """One-shot cleanup: stops idle Incus containers and removes orphaned ones."""
      import json, logging, pathlib, subprocess, sys, time

      IDLE_TIMEOUT = 600
      LAST_ACTIVE_FILE = pathlib.Path("/var/lib/locki/last-active.json")

      logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s", stream=sys.stdout, force=True)
      log = logging.getLogger(__name__)

      try: last_active = json.loads(LAST_ACTIVE_FILE.read_text())
      except (FileNotFoundError, json.JSONDecodeError): last_active = {}

      for name in [l.strip() for l in subprocess.run(["incus", "list", "--format=csv", "--columns=n"], capture_output=True, text=True).stdout.splitlines() if l.strip()]:
          r = subprocess.run(["incus", "config", "device", "get", name, "worktree", "source"], capture_output=True, text=True)
          source = r.stdout.strip() if r.returncode == 0 and r.stdout.strip() else None
          if source is None: continue
          if not pathlib.Path(source).exists():
              log.info("Deleting orphaned container %r (worktree %s is gone).", name, source)
              subprocess.run(["incus", "delete", "--force", name], capture_output=True)
              last_active.pop(name, None)
      running = set()
      for line in subprocess.run(["incus", "list", "--format=csv", "--columns=n,s"], capture_output=True, text=True).stdout.splitlines():
          parts = line.split(",", 1)
          if len(parts) == 2 and parts[1].strip() == "RUNNING": running.add(parts[0].strip())
      active = set()
      r = subprocess.run(["incus", "operation", "list", "--format=json"], capture_output=True, text=True)
      if r.returncode == 0 and r.stdout.strip():
          try:
              for op in json.loads(r.stdout):
                  if op.get("status") != "Running": continue
                  for key in ("containers", "instances"):
                      for path in (op.get("resources") or {}).get(key) or []: active.add(path.rsplit("/", 1)[-1])
          except json.JSONDecodeError: pass
      now = time.time()
      for name in running:
          if name in active: last_active[name] = now
          elif name not in last_active: last_active[name] = now
          elif now - last_active[name] >= IDLE_TIMEOUT:
              log.info("Stopping idle container %r (idle %.0fs).", name, now - last_active[name])
              subprocess.run(["incus", "stop", name], capture_output=True)
              last_active.pop(name, None)
      for name in list(last_active):
          if name not in running: last_active.pop(name)

      LAST_ACTIVE_FILE.parent.mkdir(parents=True, exist_ok=True)
      LAST_ACTIVE_FILE.write_text(json.dumps(last_active))
    path: /usr/local/bin/locki-cleanup
    overwrite: true
    permissions: "0755"
  - mode: data
    content: |
      [Unit]
      Description=Locki container cleanup
      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/locki-cleanup
    path: /etc/systemd/system/locki-cleanup.service
    overwrite: true
  - mode: data
    content: |
      [Unit]
      Description=Run locki cleanup every minute
      [Timer]
      OnBootSec=60
      OnUnitActiveSec=60
      [Install]
      WantedBy=timers.target
    path: /etc/systemd/system/locki-cleanup.timer
    overwrite: true
  - mode: system
    script: |
      #!/bin/bash
      systemctl daemon-reload
      systemctl enable --now locki-cleanup.timer

probes:
  - mode: readiness
    description: locki-base image to be built
    script: |
      #!/bin/bash
      set -euxo pipefail
      if ! timeout 900s bash -c "until sudo incus image list --format csv | grep -q locki-base; do sleep 5; done"; then
        echo >&2 "locki-base image was not built"
        exit 1
      fi
    hint: |
      The locki-base container image was not built during provisioning.
      Check the VM provisioning logs for errors.
