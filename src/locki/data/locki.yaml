minimumLimaVersion: "2.0.0"

base:
  - template:fedora

containerd:
  system: false
  user: false

mounts:
  - location: "~/.locki/worktrees"
    writable: true
  - location: "~/.locki/claude"
    mountPoint: "/root/.claude"
    writable: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      if command -v incus; then exit 0; fi
      echo "root:1000000:1000000000" >> /etc/subuid
      echo "root:1000000:1000000000" >> /etc/subgid
      dnf install -y --setopt install_weak_deps=False incus incus-client
      systemctl enable --now incus
      mkdir -p /var/cache/locki
      incus admin init --preseed <<EOF
      storage_pools:
        - name: default
          driver: dir
      networks:
        - name: incusbr0
          type: bridge
          config:
            ipv4.address: 10.99.0.1/24
            ipv4.nat: "true"
            ipv6.address: none
      profiles:
        - name: default
          config:
            environment.PATH: /opt/locki/bin:/root/.local/bin:/var/cache/locki/mise/data/shims:/var/cache/locki/pnpm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            environment.PNPM_HOME: /var/cache/locki/pnpm
            environment.UV_CACHE_DIR: /var/cache/locki/uv
            environment.PIP_CACHE_DIR: /var/cache/locki/pip
            environment.NPM_CONFIG_CACHE: /var/cache/locki/npm
            environment.YARN_CACHE_FOLDER: /var/cache/locki/yarn
            environment.GOMODCACHE: /var/cache/locki/go/mod
            environment.GOCACHE: /var/cache/locki/go/build
            environment.CARGO_HOME: /var/cache/locki/cargo
            environment.GRADLE_USER_HOME: /var/cache/locki/gradle
            environment.MAVEN_OPTS: -Dmaven.repo.local=/var/cache/locki/maven
            environment.BUNDLE_PATH: /var/cache/locki/bundle
            environment.COMPOSER_CACHE_DIR: /var/cache/locki/composer
            environment.NUGET_PACKAGES: /var/cache/locki/nuget
            environment.STACK_ROOT: /var/cache/locki/stack
            environment.CABAL_DIR: /var/cache/locki/cabal
            environment.HEX_HOME: /var/cache/locki/hex
            environment.MIX_HOME: /var/cache/locki/mix
            environment.REBAR_CACHE_DIR: /var/cache/locki/rebar3
            environment.PUB_CACHE: /var/cache/locki/pub
            environment.JULIA_DEPOT_PATH: /var/cache/locki/julia
            environment.COURSIER_CACHE: /var/cache/locki/coursier
            environment.R_LIBS_USER: /var/cache/locki/r
            environment.NIMBLE_DIR: /var/cache/locki/nimble
            environment.ZIG_GLOBAL_CACHE_DIR: /var/cache/locki/zig
            environment.DENO_DIR: /var/cache/locki/deno
            environment.BUN_INSTALL_CACHE_DIR: /var/cache/locki/bun
            environment.LEIN_HOME: /var/cache/locki/lein
            environment.TF_PLUGIN_CACHE_DIR: /var/cache/locki/terraform
            environment.CONAN_USER_HOME: /var/cache/locki/conan
            environment.VCPKG_DEFAULT_BINARY_CACHE: /var/cache/locki/vcpkg
            environment.COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
            environment.MISE_DATA_DIR: /var/cache/locki/mise/data
            environment.MISE_CACHE_DIR: /var/cache/locki/mise/cache
            environment.MISE_INSTALL_PATH: /usr/local/bin/mise
            environment.MISE_TRUSTED_CONFIG_PATHS: /
            environment.IS_SANDBOX: 1
            security.nesting: "true"
            security.privileged: "true"
            raw.lxc: |
              lxc.mount.auto = proc:rw sys:rw
              lxc.cap.drop =
          devices:
            root:
              path: /
              pool: default
              type: disk
            eth0:
              name: eth0
              network: incusbr0
              type: nic
            kmsg:
              path: /dev/kmsg
              source: /dev/kmsg
              type: unix-char
            cache:
              path: /var/cache/locki
              source: /var/cache/locki
              type: disk
            claude:
              path: /root/.claude
              source: /root/.claude
              type: disk
      EOF
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      if incus image list --format csv | grep -q locki-base; then exit 0; fi
      incus launch images:fedora/43 locki-base-builder
      incus exec locki-base-builder -- bash <<-'EOFEOF'
      	set -euxo pipefail
      	echo -e "cachedir=/var/cache/locki/fedora-43/dnf\\nkeepcache=1" >> /etc/dnf/dnf.conf
      	mkdir -p /etc/claude-code/
      	cat >/etc/claude-code/CLAUDE.md <<-'EOF'
      		**Sandbox VM environment**: Available package managers: `mise` (preferred) and `dnf` (with RPM Fusion). If there is `mise.toml`, run `mise install`. Otherwise enable specific tool versions using e.g.: `mise use -g python@3.12.1`, `mise use -g node@22`, `mise use -g jq`, falling back to `dnf` if not available.
      	EOF
      		cat >/usr/local/bin/locki-stub <<-'EOF'
      		#!/bin/sh
      		cmd=$(basename "$0")
      		echo "$cmd: not available inside the locki sandbox." >&2
      		echo "Use the 'locki' MCP tool instead:" >&2
      		echo "  run_host_command(worktree_path=\"\$PWD\", exe=\"$cmd\", args=[...])" >&2
      		exit 1
      	EOF
      	curl --retry 10 --retry-all-errors https://mirrors.fedoraproject.org  # network takes a few seconds to connect
      	dnf install -y \
      	  https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm \
      	  https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
      	dnf -y copr enable jdxcode/mise
      	dnf -y install mise
      	mise install claude@latest
      EOFEOF
      incus stop locki-base-builder
      incus publish locki-base-builder --alias locki-base
      incus delete locki-base-builder
